<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="skySBS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="seaSBS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="400" fill="url(#skySBS)"/>
  <!-- Sun -->
  <circle cx="520" cy="60" r="35" fill="#FFF9C4" opacity="0.95"/>
  <!-- Sea at bottom -->
  <rect x="0" y="300" width="600" height="100" fill="url(#seaSBS)"/>
  <path d="M 0 300 Q 100 288 200 300 Q 300 312 400 300 Q 500 288 600 300" fill="url(#seaSBS)"/>
  <!-- White waves -->
  <path d="M 0 315 Q 75 305 150 315 Q 225 325 300 315 Q 375 305 450 315 Q 525 325 600 315" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Hill -->
  <ellipse cx="300" cy="350" rx="320" ry="200" fill="#F0F0E8"/>
  <!-- Cliff/hillside -->
  <path d="M 0 380 Q 100 260 300 240 Q 450 225 600 300 L 600 400 L 0 400 Z" fill="#E8E0D0"/>
  <!-- Building structures - white cubic buildings -->
  <!-- Main building row -->
  <rect x="180" y="200" width="120" height="130" fill="white"/>
  <rect x="290" y="180" width="130" height="150" fill="white"/>
  <rect x="80" y="220" width="105" height="110" fill="white"/>
  <!-- Rooftops with blue domes/flat -->
  <rect x="80" y="210" width="105" height="15" fill="#DBEAFE"/>
  <rect x="180" y="190" width="120" height="15" fill="#DBEAFE"/>
  <rect x="290" y="170" width="130" height="15" fill="#DBEAFE"/>
  <!-- Blue iconic arched doors -->
  <!-- Door 1 -->
  <path d="M 215 330 L 215 270 Q 215 248 235 248 Q 255 248 255 270 L 255 330 Z" fill="#1E3A8A"/>
  <path d="M 222 330 L 222 272 Q 222 256 235 256 Q 248 256 248 272 L 248 330 Z" fill="#1D4ED8"/>
  <!-- Ornamental top of door 1 -->
  <path d="M 213 248 Q 235 230 257 248" stroke="#FFD700" stroke-width="3" fill="none"/>
  <!-- Door 2 -->
  <path d="M 320 330 L 320 260 Q 320 238 345 238 Q 370 238 370 260 L 370 330 Z" fill="#1E3A8A"/>
  <path d="M 328 330 L 328 262 Q 328 246 345 246 Q 362 246 362 262 L 362 330 Z" fill="#1D4ED8"/>
  <path d="M 318 238 Q 345 218 372 238" stroke="#FFD700" stroke-width="3" fill="none"/>
  <!-- Small windows (blue shutters) -->
  <rect x="110" y="240" width="25" height="30" rx="2" fill="#1D4ED8"/>
  <rect x="145" y="240" width="25" height="30" rx="2" fill="#1D4ED8"/>
  <rect x="390" y="200" width="25" height="30" rx="2" fill="#1D4ED8"/>
  <!-- Bougainvillea flowers (pink) -->
  <circle cx="180" cy="220" r="18" fill="#FF69B4" opacity="0.8"/>
  <circle cx="165" cy="235" r="14" fill="#FF1493" opacity="0.7"/>
  <circle cx="192" cy="232" r="12" fill="#FF69B4" opacity="0.7"/>
  <circle cx="410" cy="210" r="16" fill="#FF69B4" opacity="0.8"/>
  <circle cx="425" cy="225" r="12" fill="#FF1493" opacity="0.7"/>
  <!-- Cobblestone steps -->
  <rect x="270" y="330" width="60" height="10" rx="2" fill="#D4C8B0"/>
  <rect x="265" y="340" width="70" height="10" rx="2" fill="#C8BC A4"/>
  <rect x="260" y="350" width="80" height="10" rx="2" fill="#BCAE98"/>
  <!-- Label -->
  <rect x="150" y="355" width="300" height="36" rx="8" fill="#1E3A8A" opacity="0.85"/>
  <text x="300" y="379" text-anchor="middle" font-family="Cairo, Arial" font-size="18" fill="white" font-weight="bold">سيدي بوسعيد الأزرق</text>
</svg>
