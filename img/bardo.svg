<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgBardo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#800080"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgBardo)"/>
  <!-- Mosaic tile pattern background -->
  <g opacity="0.15">
    <rect x="0" y="0" width="40" height="40" fill="#FFD700"/><rect x="40" y="0" width="40" height="40" fill="#FF6347"/><rect x="80" y="0" width="40" height="40" fill="#00CED1"/><rect x="120" y="0" width="40" height="40" fill="#FFD700"/><rect x="160" y="0" width="40" height="40" fill="#FF6347"/><rect x="200" y="0" width="40" height="40" fill="#00CED1"/><rect x="240" y="0" width="40" height="40" fill="#FFD700"/><rect x="280" y="0" width="40" height="40" fill="#FF6347"/><rect x="320" y="0" width="40" height="40" fill="#00CED1"/><rect x="360" y="0" width="40" height="40" fill="#FFD700"/><rect x="400" y="0" width="40" height="40" fill="#FF6347"/><rect x="440" y="0" width="40" height="40" fill="#00CED1"/><rect x="480" y="0" width="40" height="40" fill="#FFD700"/><rect x="520" y="0" width="40" height="40" fill="#FF6347"/><rect x="560" y="0" width="40" height="40" fill="#00CED1"/>
    <rect x="0" y="40" width="40" height="40" fill="#00CED1"/><rect x="40" y="40" width="40" height="40" fill="#FFD700"/><rect x="80" y="40" width="40" height="40" fill="#FF6347"/><rect x="120" y="40" width="40" height="40" fill="#00CED1"/><rect x="160" y="40" width="40" height="40" fill="#FFD700"/>
  </g>
  <!-- Museum building -->
  <rect x="100" y="150" width="400" height="220" rx="4" fill="#F5F0E8"/>
  <rect x="100" y="150" width="400" height="30" fill="#E8E0D0"/>
  <!-- Columns -->
  <rect x="130" y="180" width="20" height="185" fill="#D4C8B0"/>
  <rect x="185" y="180" width="20" height="185" fill="#D4C8B0"/>
  <rect x="395" y="180" width="20" height="185" fill="#D4C8B0"/>
  <rect x="450" y="180" width="20" height="185" fill="#D4C8B0"/>
  <!-- Arch doorway -->
  <path d="M 250 370 L 250 260 Q 250 220 300 220 Q 350 220 350 260 L 350 370 Z" fill="#C0A060"/>
  <path d="M 258 370 L 258 262 Q 258 230 300 230 Q 342 230 342 262 L 342 370 Z" fill="#8B6914" opacity="0.8"/>
  <!-- Windows with mosaic patterns -->
  <rect x="140" y="205" width="70" height="70" rx="3" fill="#2D1560"/>
  <line x1="175" y1="205" x2="175" y2="275" stroke="#FFD700" stroke-width="2"/>
  <line x1="140" y1="240" x2="210" y2="240" stroke="#FFD700" stroke-width="2"/>
  <!-- Mosaic cross pattern in window -->
  <rect x="142" y="207" width="31" height="31" fill="#FF6347" opacity="0.5"/>
  <rect x="175" y="207" width="33" height="31" fill="#00CED1" opacity="0.5"/>
  <rect x="142" y="240" width="31" height="33" fill="#00CED1" opacity="0.5"/>
  <rect x="175" y="240" width="33" height="33" fill="#FF6347" opacity="0.5"/>
  <!-- Right window -->
  <rect x="390" y="205" width="70" height="70" rx="3" fill="#2D1560"/>
  <line x1="425" y1="205" x2="425" y2="275" stroke="#FFD700" stroke-width="2"/>
  <line x1="390" y1="240" x2="460" y2="240" stroke="#FFD700" stroke-width="2"/>
  <rect x="392" y="207" width="31" height="31" fill="#FFD700" opacity="0.5"/>
  <rect x="425" y="207" width="33" height="31" fill="#800080" opacity="0.5"/>
  <rect x="392" y="240" width="31" height="33" fill="#800080" opacity="0.5"/>
  <rect x="425" y="240" width="33" height="33" fill="#FFD700" opacity="0.5"/>
  <!-- Mosaic artwork panel in center top -->
  <rect x="220" y="160" width="160" height="50" fill="#E0D0A0"/>
  <!-- Neptune mosaic (simplified geometric) -->
  <circle cx="300" cy="185" r="18" fill="#1E90FF"/>
  <circle cx="300" cy="185" r="12" fill="#FFD700"/>
  <path d="M 285 178 Q 300 165 315 178" stroke="#FF4500" stroke-width="3" fill="none"/>
  <!-- Ground -->
  <rect x="0" y="370" width="600" height="30" fill="#5C3D11"/>
  <rect x="80" y="363" width="440" height="12" fill="#7A5025"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="15" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="550" cy="25" r="2" fill="white" opacity="0.8"/>
  <circle cx="480" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <!-- Label -->
  <rect x="170" y="20" width="260" height="36" rx="8" fill="#1A0040" opacity="0.85"/>
  <text x="300" y="44" text-anchor="middle" font-family="Cairo, Arial" font-size="18" fill="#FFD700" font-weight="bold">متحف باردو الوطني</text>
</svg>
